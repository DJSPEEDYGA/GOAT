# NGINX Configuration for GOAT Royalty Store
# Handles client-side routing for Next.js/React apps

server {
    listen 80;
    server_name 72.61.193.184;
    
    root /var/www/html;
    index index.html;
    
    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Serve static files with caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ =404;
    }
    
    # Serve HTML files directly without redirect
    location ~* \.html$ {
        add_header Content-Type text/html;
        try_files $uri =404;
    }
    
    # Serve download scripts
    location ~* \.(bat|sh|py|ps1)$ {
        add_header Content-Type application/octet-stream;
        add_header Content-Disposition "attachment";
        try_files $uri =404;
    }
    
    # Handle client-side routing - serve index.html for non-file requests
    location / {
        # Try exact file first, then try with .html extension, then serve index.html
        try_files $uri $uri.html $uri/ /index.html;
    }
    
    # Special handling for specific pages that should not redirect
    location = /ai-models-download.html {
        try_files $uri =404;
    }
    
    location = /download_models_windows.bat {
        add_header Content-Type application/octet-stream;
        add_header Content-Disposition "attachment; filename=\"download_models_windows.bat\"";
        try_files $uri =404;
    }
    
    location = /download_ollama_models.sh {
        add_header Content-Type application/octet-stream;
        add_header Content-Disposition "attachment; filename=\"download_ollama_models.sh\"";
        try_files $uri =404;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}