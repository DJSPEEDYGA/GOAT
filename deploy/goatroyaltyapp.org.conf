# GOAT Royalty App — friendly domain (app subdomain; the main
# goatroyaltyapp.org website stays wherever it is today)
# goes in /etc/nginx/sites-available/goatroyaltyapp.org
# (setup-goatroyaltyapp-domain.sh installs this and adds HTTPS via certbot)
server {
    listen 80;
    listen [::]:80;
    server_name app.goatroyaltyapp.org;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
