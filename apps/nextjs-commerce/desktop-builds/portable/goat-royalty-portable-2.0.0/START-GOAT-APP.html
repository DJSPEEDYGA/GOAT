<!DOCTYPE html>
<html>
<head>
    <title>GOAT Royalty App - Portable Launcher</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 30px;
        }
        a.button {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            margin: 10px;
            transition: transform 0.2s;
        }
        a.button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐐 GOAT ROYALTY APP</h1>
        <h3>Portable Edition v2.0</h3>
        <p>Click below to launch the application</p>
        <a href="web-app/index.html" class="button">🚀 Launch GOAT App</a>
        <br><br>
        <p><small>Requires a web browser (Chrome, Firefox, Safari, Edge)</small></p>
    </div>
</body>
</html>
