# Reverse proxy for the gated Investor Living EPK.
# Place in /etc/nginx/sites-available/ and symlink into sites-enabled/.
# Replace server_name and (recommended) terminate TLS with certbot.

server {
    listen 80;
    server_name epk.example.com;   # <-- set to your EPK hostname

    # Recommended: redirect to HTTPS once certbot is configured.
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:4600;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Do not expose dotfiles.
    location ~ /\. { deny all; }
}

