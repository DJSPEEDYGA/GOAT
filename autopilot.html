<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autopilot | GOAT Royalty</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="css/goat-theme.css">
  <link rel="stylesheet" href="css/goat-brand.css">
  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #07070c; color: #f3ead2;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      text-align: center; padding: 24px;
    }
    .panel {
      max-width: 560px; padding: 42px 36px; border-radius: 20px;
      background: linear-gradient(165deg, rgba(24,24,36,.96), rgba(10,10,16,.96));
      border: 1px solid rgba(245,197,66,.35);
      box-shadow: 0 18px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(245,197,66,.12);
    }
    img.logo { width: 96px; height: 96px; object-fit: contain; filter: drop-shadow(0 0 18px rgba(245,197,66,.45)); }
    h1 { margin: 18px 0 6px; font-size: 1.6rem; color: #f5c542; letter-spacing: .04em; }
    p { margin: 8px 0 22px; color: #cdbf9a; line-height: 1.5; }
    a.btn {
      display: inline-block; padding: 12px 26px; border-radius: 999px;
      background: linear-gradient(135deg, #f5c542, #b8860b); color: #07070c;
      font-weight: 700; text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="panel">
    <img class="logo" src="goat-logo.png" alt="GOAT Royalty logo">
    <h1>Autopilot</h1>
    <p>This GOAT Royalty module is being finished for the full platform release. Head back to the command center while the crew wires it up.</p>
    <a class="btn" href="index.html">Back to GOAT Royalty Store</a>
  </main>
</body>
</html>
