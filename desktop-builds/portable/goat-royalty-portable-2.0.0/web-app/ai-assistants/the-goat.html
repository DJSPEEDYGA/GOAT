<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Goat - GOAT Royalty Leader AI</title>
    <link rel="stylesheet" href="../css/goat-theme.css">
    <link rel="stylesheet" href="../css/goat-brand.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #4a0e0e, #1a1a2e);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(99, 102, 241, 0.2));
            border-radius: 20px;
            margin-bottom: 30px;
            border: 2px solid rgba(16, 185, 129, 0.3);
        }
        .avatar {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 150px;
            margin: 0 auto 20px;
            border: 5px solid rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .name {
            font-size: 4em;
            font-weight: bold;
            margin: 0 0 20px;
            background: linear-gradient(135deg, #10b981, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .title {
            color: #10b981;
            font-size: 2em;
            margin-bottom: 20px;
        }
        .chat-interface {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid rgba(16, 185, 129, 0.3);
            margin-bottom: 30px;
        }
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .message {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 10px;
            max-width: 80%;
        }
        .message.goat {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(99, 102, 241, 0.2));
            border: 1px solid rgba(16, 185, 129, 0.3);
            margin-left: auto;
        }
        .message.user {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-area {
            display: flex;
            gap: 15px;
        }
        .input-area input {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid rgba(16, 185, 129, 0.3);
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-size: 1em;
        }
        .input-area button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #10b981, #6366f1);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
        }
        .model-selector {
            margin-bottom: 20px;
        }
        .model-selector select {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid rgba(16, 185, 129, 0.3);
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-size: 1em;
        }
        .back-link {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #10b981, #6366f1);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">🐐</div>
            <h1 class="name">The Goat</h1>
            <p class="title">The Leader • The Visionary • The GOAT</p>
        </div>

        <div class="chat-interface">
            <h2>💬 Chat with The Goat</h2>
            <div class="model-selector">
                <select id="model-select">
                    <option value="llama3.1:8b">Llama 3.1 8B</option>
                    <option value="mistral:7b">Mistral 7B</option>
                    <option value="qwen2.5:7b">Qwen 2.5 7B</option>
                    <option value="gemma3:4b">Gemma 3 4B</option>
                </select>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="message goat">
                    <div>Welcome, my friend. I am The Goat. Leading this empire to greatness, one victory at a time. What brings you to my domain today?</div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Speak with The Goat...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <a href="../money-penny-codex.html" class="back-link">← Back to AI Codex</a>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const modelSelect = document.getElementById('model-select');

        function addMessage(message, isGoat = false) {
            const div = document.createElement('div');
            div.className = `message ${isGoat ? 'goat' : 'user'}`;
            div.innerHTML = `<div>${message}</div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, false);
            messageInput.value = '';

            try {
                addMessage('The Goat is思考ing...', true);

                const response = await fetch('http://localhost:11434/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        prompt: `You are The Goat, the leader of GOAT Royalty. You are confident, visionary, ambitious, and speak with authority. You lead by example and inspire others. Respond to: ${message}`,
                        stream: false
                    })
                });

                const data = await response.json();
                chatMessages.lastChild.remove();
                addMessage(data.response, true);

            } catch (error) {
                chatMessages.lastChild.remove();
                addMessage("Ensure Ollama is running on localhost:11434", true);
            }
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
