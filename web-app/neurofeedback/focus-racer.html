<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Racer — TAHS Neurofeedback</title>
<style>
  html,body{margin:0;height:100%;background:#050508;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;}
  #game{display:block;width:100vw;height:100vh;}
  #hud{position:fixed;top:14px;left:14px;z-index:10;}
  #back{position:fixed;top:14px;right:14px;z-index:10;color:#ffd700;text-decoration:none;
    background:rgba(10,14,25,.85);border:1px solid rgba(255,215,0,.35);border-radius:10px;padding:8px 14px;font-weight:700;}
  #speedo{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:10;color:#ffd700;
    background:rgba(10,10,14,.88);border:1px solid rgba(255,215,0,.4);border-radius:12px;
    padding:8px 20px;font-size:18px;font-weight:900;letter-spacing:1px;}
  #msg{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:10;color:#fff;
    background:rgba(10,10,14,.88);border:1px solid rgba(255,215,0,.4);border-radius:12px;
    padding:10px 22px;font-size:15px;max-width:700px;text-align:center;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"></div>
<a id="back" href="index.html">← Game Hub</a>
<div id="vehicleBtn" style="position:fixed;top:60px;right:14px;z-index:10;color:#ffd700;cursor:pointer;background:rgba(10,14,25,.85);border:1px solid rgba(255,215,0,.35);border-radius:10px;padding:8px 14px;font-weight:700;">🏍️ Switch to R6 Bike</div>
<div id="speedo">🏎️ <span id="mph">0</span> MPH</div>
<div id="msg">Sustained focus builds speed. Spike into stress and the police get on your tail!</div>

<script src="signal-engine.js"></script>
<script>
Neurofeedback.injectStyles();
const engine = Neurofeedback.mountSignalPanel(document.getElementById('hud'), {metric:'focus'});

const cv=document.getElementById('game'), cx=cv.getContext('2d');
function fit(){cv.width=innerWidth;cv.height=innerHeight;} fit(); addEventListener('resize',fit);

let focus=50, spike=false;
engine.on(s=>{focus=s.focus; spike=s.spike;});

let mph=0, roadScroll=0, heat=0; // heat: 0..1 police pressure
const mphEl=document.getElementById('mph'), msg=document.getElementById('msg');

const IMG={};
[['bg','assets/bg-city-night.jpg?v=2'],['road','assets/road-highway.jpg?v=1'],['car','assets/supercar.png?v=2'],['police','assets/police.png?v=2'],['bike','assets/motorcycle.png?v=2']]
  .forEach(([k,src])=>{const im=new Image(); im.src=src; IMG[k]=im;});

let vehicle='car';
document.getElementById('vehicleBtn').onclick=function(){
  vehicle = vehicle==='car' ? 'bike' : 'car';
  this.textContent = vehicle==='car' ? '🏍️ Switch to R6 Bike' : '🏎️ Switch to Supercar';
};

function update(dt){
  const targetSpeed = focus*2.4;                    // focus 100 -> 240 mph
  mph += (targetSpeed - mph) * dt * (mph<targetSpeed?0.5:1.2);
  if (spike) heat = Math.min(1, heat + dt*1.2);     // spike summons police
  else if (focus>65) heat = Math.max(0, heat - dt*0.25);
  if (heat>0.2) mph = Math.min(mph, 150 - heat*70); // police pressure slows you
  mph = Math.max(0, mph);
  roadScroll += mph*dt*3;
  mphEl.textContent = Math.round(mph);
  msg.textContent = heat>0.5 ? '🚨 Police on your tail! Steady your focus to shake them.'
    : spike ? '⚡ Stress spike — sirens behind you!'
    : focus>75 ? 'Full send — the exotic is flying. Stay locked in.'
    : focus>45 ? 'Building speed… deepen the focus.'
    : 'Drifting off… the engine bogs down. Refocus.';
}

function drawSprite(img,x,y,w,flash,t){
  if (!img.complete || !img.naturalWidth) return;
  const h=w*img.naturalHeight/img.naturalWidth;
  cx.drawImage(img, x-w/2, y-h, w, h);
  if (flash){ const on=Math.sin(t/80)>0;
    cx.fillStyle=on?'rgba(255,40,60,0.8)':'rgba(40,90,255,0.8)';
    cx.beginPath(); cx.arc(x, y-h*0.98, 9, 0, 7); cx.fill(); }
}

function draw(t){
  const W=cv.width,H=cv.height;
  // Night city backdrop (cover fit, upper 60%)
  if (IMG.bg.complete && IMG.bg.naturalWidth){
    const bw=IMG.bg.naturalWidth, bh=IMG.bg.naturalHeight;
    const sc=Math.max(W/bw, H*0.62/bh);
    cx.drawImage(IMG.bg, (W-bw*sc)/2, H*0.62-bh*sc, bw*sc, bh*sc);
  } else { cx.fillStyle='#0a0a18'; cx.fillRect(0,0,W,H*0.62); }

  // Divided-highway road surface, scrolling with speed
  if (IMG.road.complete && IMG.road.naturalWidth){
    const rh=H*0.4, rw=rh*IMG.road.naturalWidth/IMG.road.naturalHeight;
    let x=-(roadScroll % rw);
    for(; x<W; x+=rw) cx.drawImage(IMG.road, x, H*0.6, rw, rh);
    cx.fillStyle='rgba(5,5,15,0.25)'; cx.fillRect(0,H*0.6,W,H*0.4);
  } else {
    cx.fillStyle='#1c1c22'; cx.fillRect(0,H*0.6,W,H*0.4);
    cx.strokeStyle='#ffd700'; cx.lineWidth=5; cx.setLineDash([50,45]);
    cx.lineDashOffset = -roadScroll % 95;
    cx.beginPath(); cx.moveTo(0,H*0.8); cx.lineTo(W,H*0.8); cx.stroke(); cx.setLineDash([]);
  }

  // Speed lines
  if (mph>120){ cx.strokeStyle='rgba(255,255,255,0.25)'; cx.lineWidth=2;
    for(let i=0;i<8;i++){ const y=H*0.62+((i*61)%(H*0.36)); const x=W-((roadScroll*2+i*173)%(W+200));
      cx.beginPath(); cx.moveTo(x,y); cx.lineTo(x+60+mph*0.4,y); cx.stroke(); } }

  // Police behind (left), pulls closer with heat
  if (heat>0.05){ drawSprite(IMG.police, W*0.42 - (0.35-heat*0.28)*W, H*0.78+14, 300, true, t); }

  // Player vehicle
  const shake = spike ? Math.sin(t/30)*3 : 0;
  drawSprite(IMG[vehicle], W*0.55, H*0.78+14+shake, vehicle==='car'?340:230, false, t);
  // Exhaust flame at high focus
  if (mph>180){ cx.fillStyle=`rgba(80,160,255,${0.5+Math.sin(t/40)*0.3})`;
    cx.beginPath(); cx.moveTo(W*0.55-165,H*0.78-18); cx.lineTo(W*0.55-210-Math.random()*30,H*0.78-14); cx.lineTo(W*0.55-165,H*0.78-8); cx.closePath(); cx.fill(); }

  // Red/blue wash when heat is high
  if (heat>0.4){ const flash=Math.sin(t/90)>0;
    cx.fillStyle=flash?'rgba(255,0,60,0.07)':'rgba(0,80,255,0.07)'; cx.fillRect(0,0,W,H); }
}

let last=performance.now();
(function loop(t){ const dt=Math.min(0.05,(t-last)/1000); last=t; update(dt); draw(t); requestAnimationFrame(loop); })(last);
</script>
</body>
</html>
