<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grow the Garden — TAHS Neurofeedback</title>
<style>
  html,body{margin:0;height:100%;background:#04120a;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;}
  #game{display:block;width:100vw;height:100vh;}
  #hud{position:fixed;top:14px;left:14px;z-index:10;}
  #back{position:fixed;top:14px;right:14px;z-index:10;color:#ffd700;text-decoration:none;
    background:rgba(10,14,25,.85);border:1px solid rgba(255,215,0,.35);border-radius:10px;padding:8px 14px;font-weight:700;}
  #toggle{position:fixed;top:64px;right:14px;z-index:10;color:#c8f7d0;cursor:pointer;
    background:rgba(6,24,14,.85);border:1px solid rgba(120,255,160,.4);border-radius:10px;padding:8px 14px;font-weight:700;}
  #msg{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:10;color:#eafff0;
    background:rgba(6,24,14,.85);border:1px solid rgba(120,255,160,.4);border-radius:12px;
    padding:10px 22px;font-size:15px;max-width:700px;text-align:center;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"></div>
<a id="back" href="index.html">← Game Hub</a>
<div id="toggle">🔥 Switch to Campfire</div>
<div id="msg">Breathe slow and stay calm — your calm is the sunlight this garden grows on.</div>

<script src="signal-engine.js"></script>
<script>
Neurofeedback.injectStyles();
const engine = Neurofeedback.mountSignalPanel(document.getElementById('hud'), {metric:'calm'});

const cv=document.getElementById('game'), cx=cv.getContext('2d');
function fit(){cv.width=innerWidth;cv.height=innerHeight;} fit(); addEventListener('resize',fit);

let calm=50, spike=false;
engine.on(s=>{calm=s.calm; spike=s.spike;});

let mode='garden';
const toggle=document.getElementById('toggle'), msg=document.getElementById('msg');
toggle.onclick=()=>{ mode = mode==='garden'?'campfire':'garden';
  toggle.textContent = mode==='garden' ? '🔥 Switch to Campfire' : '🌱 Switch to Garden'; };

let growth=0;  // 0..1 bloom progress (garden) ; glow (campfire uses calm directly)

const IMG={};
[['garden','assets/bg-garden.jpg?v=2'],['mountains','assets/bg-mountains.jpg?v=2'],['flower','assets/flower.png?v=2']]
  .forEach(([k,src])=>{const im=new Image(); im.src=src; IMG[k]=im;});
function update(dt){
  const rate = calm>60 ? (calm-60)/40*0.03 : calm<35 ? -0.015 : 0;
  growth = Math.max(0, Math.min(1, growth + rate*dt*10));
  if (mode==='garden'){
    msg.textContent = spike ? '⚡ A gust of stress — the petals tremble. Ease back into calm.'
      : growth>=1 ? '🌸 Full bloom! Your calm brought the whole garden to life.'
      : calm>60 ? 'The plant is growing… gentle and steady wins.'
      : calm<35 ? 'The garden wilts a little without your calm…'
      : 'Hold a soft, easy calm and watch it grow.';
  } else {
    msg.textContent = spike ? '⚡ Stress! The fire sputters — slow your breath to bring it back.'
      : calm>70 ? '🔥 A warm, golden fire. Perfectly tended.'
      : calm>40 ? 'The embers glow… keep the calm coming.'
      : 'The fire fades to embers without calm…';
  }
}

function drawGarden(t){
  const W=cv.width,H=cv.height;
  const day=calm/100;
  if (IMG.garden.complete && IMG.garden.naturalWidth){
    const bw=IMG.garden.naturalWidth, bh=IMG.garden.naturalHeight;
    const sc=Math.max(W/bw, H/bh);
    cx.drawImage(IMG.garden, (W-bw*sc)/2, (H-bh*sc)/2, bw*sc, bh*sc);
    // Garden dims when calm is low, glows warm at full bloom
    cx.fillStyle=`rgba(8,14,30,${0.55*(1-day)})`; cx.fillRect(0,0,W,H);
    if (growth>0.85) { cx.fillStyle=`rgba(255,230,150,${(growth-0.85)*0.5})`; cx.fillRect(0,0,W,H); }
  } else {
    const g=cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,`rgb(${20+day*100},${40+day*130},${70+day*110})`);
    g.addColorStop(1,`rgb(${10+day*60},${50+day*90},${30+day*40})`);
    cx.fillStyle=g; cx.fillRect(0,0,W,H);
  }
  // Sun shafts breaking through as calm rises
  if (day>0.5){
    cx.save(); cx.globalAlpha=(day-0.5)*0.5;
    for(let i=0;i<3;i++){
      const rx=W*(0.25+i*0.22)+Math.sin(t/4000+i)*30;
      const ray=cx.createLinearGradient(rx,0,rx+140,H);
      ray.addColorStop(0,'rgba(255,244,200,0.16)'); ray.addColorStop(1,'rgba(255,244,200,0)');
      cx.fillStyle=ray;
      cx.beginPath(); cx.moveTo(rx,0); cx.lineTo(rx+90,0); cx.lineTo(rx+240,H); cx.lineTo(rx+110,H); cx.closePath(); cx.fill();
    }
    cx.restore();
  }

  // Soil with depth gradient
  const soil=cx.createLinearGradient(0,H*0.86,0,H);
  soil.addColorStop(0,'rgba(58,38,20,0.9)'); soil.addColorStop(1,'rgba(20,12,6,0.95)');
  cx.fillStyle=soil; cx.fillRect(0,H*0.86,W,H*0.14);

  // Main flower grows from center: revealed from the soil up as growth rises
  const baseX=W/2, baseY=H*0.88;
  if (IMG.flower.complete && IMG.flower.naturalWidth){
    const fullH = H*0.62, fw = fullH*IMG.flower.naturalWidth/IMG.flower.naturalHeight;
    const vis = 0.08 + growth*0.92;               // fraction of plant above the soil
    const srcH = IMG.flower.naturalHeight*vis;
    const sway = Math.sin(t/900)*8*growth;
    // Contact shadow at the base of the plant
    const ps=cx.createRadialGradient(baseX,baseY,2,baseX,baseY,fw*0.5);
    ps.addColorStop(0,'rgba(0,0,0,0.45)'); ps.addColorStop(1,'rgba(0,0,0,0)');
    cx.save(); cx.translate(baseX,baseY); cx.scale(1,0.12); cx.translate(-baseX,-baseY);
    cx.fillStyle=ps; cx.beginPath(); cx.arc(baseX,baseY,fw*0.5,0,7); cx.fill(); cx.restore();
    cx.drawImage(IMG.flower, 0, IMG.flower.naturalHeight-srcH, IMG.flower.naturalWidth, srcH,
                 baseX-fw/2+sway, baseY-fullH*vis, fw, fullH*vis);
    // Drifting pollen motes in the light
    cx.fillStyle=`rgba(255,240,180,${0.25+day*0.35})`;
    for(let i=0;i<14;i++){
      const mx=(i*173+t*0.014*(10+i%5))%W, my=H*0.25+((i*97)%Math.round(H*0.55))+Math.sin(t/1200+i)*12;
      cx.beginPath(); cx.arc(mx,my,1.4+(i%3)*0.6,0,7); cx.fill();
    }
  } else {
    const stemH = 40 + growth*(H*0.42);
    cx.strokeStyle='#2f8f4e'; cx.lineWidth=8; cx.lineCap='round';
    cx.beginPath(); cx.moveTo(baseX,baseY);
    cx.quadraticCurveTo(baseX+Math.sin(t/900)*14, baseY-stemH*0.6, baseX, baseY-stemH); cx.stroke();
  }
  vignette(W,H);
}

function vignette(W,H){
  const vg=cx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.45,W/2,H/2,Math.max(W,H)*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,6,4,0.45)');
  cx.fillStyle=vg; cx.fillRect(0,0,W,H);
}

const sparks=[];
function drawCampfire(t,dt){
  const W=cv.width,H=cv.height;
  if (IMG.mountains.complete && IMG.mountains.naturalWidth){
    const bw=IMG.mountains.naturalWidth, bh=IMG.mountains.naturalHeight;
    const sc=Math.max(W/bw, H/bh);
    cx.drawImage(IMG.mountains, (W-bw*sc)/2, (H-bh*sc)/2, bw*sc, bh*sc);
    cx.fillStyle='rgba(4,4,14,0.72)'; cx.fillRect(0,0,W,H);   // mountain night
  } else { cx.fillStyle='#080604'; cx.fillRect(0,0,W,H); }
  // Stars
  cx.fillStyle='rgba(255,255,255,0.7)';
  for(let i=0;i<60;i++){ cx.fillRect((i*97)%W, (i*61)%(H*0.5), 2,2); }
  const glow=calm/100;
  // Fire glow halo (soft radial falloff)
  const hr=160+glow*140;
  const hg=cx.createRadialGradient(W/2,H*0.7,10,W/2,H*0.7,hr);
  hg.addColorStop(0,`rgba(255,140,40,${0.08+glow*0.26})`); hg.addColorStop(1,'rgba(255,140,40,0)');
  cx.fillStyle=hg;
  cx.beginPath(); cx.arc(W/2,H*0.7,hr,0,7); cx.fill();
  // Logs
  cx.fillStyle='#4a2c14';
  cx.save(); cx.translate(W/2,H*0.78);
  cx.rotate(0.3); cx.fillRect(-70,-9,140,18); cx.rotate(-0.6); cx.fillRect(-70,-9,140,18); cx.restore();
  // Flames scale with calm
  const fh=30+glow*170;
  for(let f=0;f<3;f++){
    const fx=W/2+(f-1)*22, flick=Math.sin(t/90+f*2)*8*(1+glow);
    const grad=cx.createLinearGradient(0,H*0.78,0,H*0.78-fh);
    grad.addColorStop(0,'rgba(255,90,20,0.95)'); grad.addColorStop(0.6,'rgba(255,170,40,0.85)'); grad.addColorStop(1,'rgba(255,240,150,0)');
    cx.fillStyle=grad;
    cx.beginPath(); cx.moveTo(fx-20,H*0.78);
    cx.quadraticCurveTo(fx-8+flick,H*0.78-fh*0.55, fx+flick*0.5,H*0.78-fh);
    cx.quadraticCurveTo(fx+10+flick,H*0.78-fh*0.5, fx+20,H*0.78); cx.closePath(); cx.fill();
  }
  // Sparks
  if (Math.random()<glow*0.5) sparks.push({x:W/2+(Math.random()-0.5)*30,y:H*0.75,vy:-40-Math.random()*60,life:1});
  cx.fillStyle='#ffcf70';
  for(let i=sparks.length-1;i>=0;i--){ const s=sparks[i]; s.y+=s.vy*dt; s.x+=Math.sin(t/100+i)*0.6; s.life-=dt*0.7;
    if(s.life<=0){sparks.splice(i,1);continue;}
    cx.globalAlpha=s.life; cx.fillRect(s.x,s.y,3,3); cx.globalAlpha=1; }
  // Firelight cast onto the ground
  const fl=cx.createRadialGradient(W/2,H*0.8,10,W/2,H*0.8,W*0.3);
  fl.addColorStop(0,`rgba(255,150,60,${0.08+glow*0.14})`); fl.addColorStop(1,'rgba(255,150,60,0)');
  cx.save(); cx.translate(W/2,H*0.8); cx.scale(1,0.35); cx.translate(-W/2,-H*0.8);
  cx.fillStyle=fl; cx.beginPath(); cx.arc(W/2,H*0.8,W*0.3,0,7); cx.fill(); cx.restore();
  vignette(W,H);
}

let last=performance.now();
(function loop(t){ const dt=Math.min(0.05,(t-last)/1000); last=t; update(dt);
  if (mode==='garden') drawGarden(t); else drawCampfire(t,dt);
  requestAnimationFrame(loop); })(last);
</script>
</body>
</html>
